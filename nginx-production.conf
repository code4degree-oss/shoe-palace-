# Kesurved Nginx Production Configuration
# Place this in /etc/nginx/sites-available/kesurved

# Rate Limiting Zones (to prevent abuse)
# Since you are behind Cloudflare, we must use the CF-Connecting-IP header
# instead of $binary_remote_addr, otherwise Cloudflare's IPs will get rate limited.
limit_req_zone $http_cf_connecting_ip zone=api_limit:10m rate=5r/s;
limit_req_zone $http_cf_connecting_ip zone=login_limit:10m rate=1r/s;

# Redirect www to non-www for better SEO
server {
    listen 80;
    server_name www.kesurvedherbal.com;
    return 301 $scheme://kesurvedherbal.com$request_uri;
}

server {
    listen 80;
    server_name kesurvedherbal.com;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser Caching for Static Assets (_next/static)
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Browser Caching for User Uploaded Images
    location /uploads/ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Rate Limiting for General APIs
    location /api/ {
        proxy_pass http://localhost:3000;
        limit_req zone=api_limit burst=10 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stricter Rate Limiting for Auth APIs
    location /api/auth/ {
        proxy_pass http://localhost:3000;
        limit_req zone=login_limit burst=5 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
